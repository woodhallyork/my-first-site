<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예쁘게 꾸민 실습 웹페이지</title>
    <style>
        body {
            background-color: #e6f7ff; /* 밝은 하늘색 */
            font-family: 'Malgun Gothic', Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff4500;
            font-size: 36px;
        }
        h2 {
            color: #2e8b57;
            font-size: 28px;
        }
        p {
            color: #333333;
            font-size: 18px;
        }
        ul {
            text-align: left;
            display: inline-block;
            margin-top: 20px;
            background-color: #ffffff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        table, th, td {
            border: 1px solid #333;
            padding: 10px 15px;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>안녕하세요!</h1>
    <p>이것은 예쁘게 꾸민 실습용 웹페이지입니다.</p>

    <h2>목록 연습</h2>
    <ul>
        <li>HTML 배우기</li>
        <li>CSS 적용해 보기</li>
        <li>테이블 꾸미기</li>
        <li>버튼 만들기</li>
    </ul>

    <h2>테이블 연습</h2>
    <table>
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>나이</th>
        </tr>
        <tr>
            <td>1</td>
            <td>홍길동</td>
            <td>25</td>
        </tr>
        <tr>
            <td>2</td>
            <td>김철수</td>
            <td>30</td>
        </tr>
        <tr>
            <td>3</td>
            <td>이영희</td>
            <td>28</td>
        </tr>
    </table>

    <p><a href="https://www.naver.com" target="_blank">네이버로 이동</a></p>
</body>
</html>
<p>테스</p>
